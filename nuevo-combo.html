<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuevo Pedido</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="logo-container">
        <img src="Assets/logo 3.webp" alt="ComboCuba Express" class="logo" />
      </div>
    </header>

    <div class="container main-content">
      <h1>Nuevo Pedido de Combo</h1>
      <form id="form-combo">
        <div class="form-group">
          <label for="nombre-cliente">Nombre del Cliente*</label>
          <input type="text" id="nombre-cliente" required />
        </div>

        <div class="form-group">
          <label for="direccion">Dirección</label>
          <input type="text" id="direccion" />
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono* (Formato: 5xxxxxxx o 7xxxxxxx)</label>
          <input
            type="tel"
            id="telefono"
            pattern="[57][0-9]{7}"
            required
            placeholder="Ej: 51234567"
            title="Número cubano (5/7 seguido de 7 dígitos)"
          />
        </div>

        <div class="form-group">
          <label for="tasa-dolar">Precio del dólar informal (CUP)*</label>
          <input
            type="number"
            id="tasa-dolar"
            step="0.01"
            min="1"
            required
            placeholder="Ej: 120.50"
          />
        </div>

        <h3>Productos del Combo</h3>
        <div id="productos-container"></div>

        <button type="button" class="btn" id="agregar-producto">
          + Añadir Producto
        </button>

        <div class="totales">
          <h3>Resumen del Pedido</h3>
          <p>
            <strong>Costo Total:</strong> $<span id="costo-total">0.00</span>
            CUP
          </p>
          <p>
            <strong>Precio de Venta Total:</strong> $<span id="precio-total"
              >0.00</span
            >
            USD (<span id="precio-total-cup">0.00</span> CUP)
          </p>
          <p>
            <strong>Ganancia Total:</strong> $<span id="ganancia-total"
              >0.00</span
            >
            CUP
          </p>
        </div>

        <button type="submit" class="btn btn-primary">Guardar Pedido</button>
      </form>
    </div>
    <script src="js/app.js"></script>
    <script src="js/productos.js"></script>
    <script src="js/combos.js"></script>
  </body>
</html>
