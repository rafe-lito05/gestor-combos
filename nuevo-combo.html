<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuevo Pedido</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Nuevo Pedido de Combo</h1>
      <form id="form-combo">
        <div class="form-group">
          <label for="nombre-cliente">Nombre del Cliente*</label>
          <input type="text" id="nombre-cliente" required />
        </div>

        <div class="form-group">
          <label for="direccion">Dirección</label>
          <input type="text" id="direccion" />
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono*</label>
          <input type="tel" id="telefono" required pattern="[0-9]{10,15}" />
        </div>

        <h3>Productos del Combo</h3>
        <div id="productos-container"></div>

        <button type="button" class="btn" id="agregar-producto">
          + Añadir Producto
        </button>

        <div class="totales">
          <h3>Resumen del Pedido</h3>
          <p>
            <strong>Costo Total:</strong> $<span id="costo-total">0.00</span>
          </p>
          <p>
            <strong>Precio de Venta Total:</strong> $<span id="precio-total"
              >0.00</span
            >
          </p>
          <p>
            <strong>Ganancia Total:</strong> $<span id="ganancia-total"
              >0.00</span
            >
          </p>
        </div>

        <button type="submit" class="btn btn-primary">Guardar Pedido</button>
      </form>
    </div>
    <script src="js/app.js"></script>
    <script src="js/productos.js"></script>
    <script src="js/combos.js"></script>
  </body>
</html>
