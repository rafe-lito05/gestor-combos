<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Pedido</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="logo-container">
        <img src="Assets/logo 3.webp" alt="ComboCuba Express" class="logo" />
      </div>
    </header>

    <div class="container main-content">
      <h1>Editar Pedido</h1>
      <form id="form-editar-combo">
        <div class="form-group">
          <label for="editar-nombre-cliente">Nombre del Cliente*</label>
          <input type="text" id="editar-nombre-cliente" required />
        </div>

        <div class="form-group">
          <label for="editar-direccion">Dirección</label>
          <input type="text" id="editar-direccion" />
        </div>

        <div class="form-group">
          <label for="editar-telefono"
            >Teléfono* (Formato: 5xxxxxxx o 7xxxxxxx)</label
          >
          <input
            type="tel"
            id="editar-telefono"
            pattern="[57][0-9]{7}"
            required
            placeholder="Ej: 51234567"
            title="Número cubano (5/7 seguido de 7 dígitos)"
          />
        </div>

        <div class="form-group">
          <label for="editar-estado">Estado*</label>
          <select id="editar-estado" class="estado-select" required>
            <option value="pendiente">Pendiente</option>
            <option value="completado">Completado</option>
          </select>
        </div>

        <h3>Productos del Combo</h3>
        <div id="editar-productos-container"></div>

        <button type="button" class="btn" id="agregar-producto-editar">
          + Añadir Producto
        </button>

        <div class="totales">
          <h3>Resumen del Pedido</h3>
          <p>
            <strong>Costo Total:</strong> $<span id="editar-costo-total"
              >0.00</span
            >
          </p>
          <p>
            <strong>Precio de Venta Total:</strong> $<span
              id="editar-precio-total"
              >0.00</span
            >
          </p>
          <p>
            <strong>Ganancia Total:</strong> $<span id="editar-ganancia-total"
              >0.00</span
            >
          </p>
        </div>

        <div class="botones-edicion">
          <button type="submit" class="btn btn-primary">Guardar Cambios</button>
          <a href="index.html" class="btn btn-danger">Cancelar</a>
        </div>
      </form>
    </div>
    <script src="js/app.js"></script>
    <script src="js/productos.js"></script>
    <script src="js/combos.js"></script>
  </body>
</html>
